// --- GLOBAL STYLES & ANIMATIONS ---
function GlobalStyles() {
  return (
    <style>{`
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(16px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }
      @keyframes popIn {
        0% { transform: scale(1); }
        40% { transform: scale(1.15); }
        100% { transform: scale(1); }
      }
      @keyframes checkPop {
        0% { transform: scale(0); }
        60% { transform: scale(1.2); }
        100% { transform: scale(1); }
      }
      @keyframes subtotalReveal {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* Satisfying press feedback for all interactive elements */
      .press-scale {
        transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), 
                    box-shadow 0.2s cubic-bezier(0.34, 1.56, 0.64, 1),
                    border-color 0.2s ease,
                    background 0.2s ease,
                    color 0.2s ease;
      }
      .press-scale:active {
        transform: scale(0.95) \!important;
      }

      /* Smaller press for tight elements */
      .press-scale-sm {
        transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1),
                    box-shadow 0.2s cubic-bezier(0.34, 1.56, 0.64, 1),
                    border-color 0.2s ease,
                    background 0.2s ease,
                    color 0.2s ease;
      }
      .press-scale-sm:active {
        transform: scale(0.92) \!important;
      }

      /* Hover glow for buttons */
      .hover-glow:hover {
        box-shadow: 0 0 16px rgba(24, 158, 211, 0.25);
      }

      /* Quantity number pop */
      .qty-pop {
        animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      /* Card entrance */
      .card-enter {
        animation: slideUp 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      /* Check mark pop */
      .check-pop {
        animation: checkPop 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      /* Subtotal reveal */
      .subtotal-reveal {
        animation: subtotalReveal 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      /* Smooth scroll & elastic feel */
      * {
        scroll-behavior: smooth;
        -webkit-tap-highlight-color: transparent;
        -webkit-overflow-scrolling: touch;
      }
      html, body {
        overscroll-behavior-y: none;
      }
      .elastic-content > * {
        animation: slideUp 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .elastic-content > *:nth-child(1) { animation-delay: 0.0s; }
      .elastic-content > *:nth-child(2) { animation-delay: 0.06s; }
      .elastic-content > *:nth-child(3) { animation-delay: 0.12s; }
      .elastic-content > *:nth-child(4) { animation-delay: 0.18s; }
      .elastic-content > *:nth-child(5) { animation-delay: 0.24s; }

      /* Respect reduced motion */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms \!important;
          animation-iteration-count: 1 \!important;
          transition-duration: 0.01ms \!important;
          scroll-behavior: auto \!important;
        }
        .press-scale:active,
        .press-scale-sm:active {
          transform: none \!important;
        }
      }
    `}</style>
  );
}

// --- COMPONENTS ---

function SizeSelector({ selected, onChange }) {
  return (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 6 }}>
      {SIZES.map((s, i) => (
        <button
          key={s}
          className="press-scale-sm"
          onClick={() => { haptic.light(); onChange(i); }}
          style={{
            height: 44, borderRadius: 12,
            border: selected === i ? `2px solid ${T.accent}` : `2px solid ${T.grayMuted}`,
            background: selected === i ? T.accent : T.card,
            color: selected === i ? T.white : T.grayLight,
            fontFamily: T.font, fontWeight: 700, fontSize: 15, cursor: "pointer",
            transition: "all 0.15s",
            boxShadow: selected === i ? `0 2px 12px ${T.accentGlow}` : "none",
          }}
        >
          {s}
        </button>
      ))}
    </div>
  );
}

function QuantitySelector({ value, onChange }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 20, justifyContent: "center" }}>
      <button
        className="press-scale hover-glow"
        onClick={() => { haptic.medium(); onChange(Math.max(1, value - 1)); }}
        style={{
          width: 48, height: 48, borderRadius: 24, border: `2px solid ${T.accent}`,
          background: "transparent", fontSize: 22, fontWeight: 700, cursor: "pointer",
          color: T.accent, display: "flex", alignItems: "center", justifyContent: "center",
          fontFamily: T.font, transition: "all 0.15s",
        }}
      >−</button>
      <div style={{ textAlign: "center", minWidth: 50 }}>
        <div key={value} className="qty-pop" style={{ fontSize: 36, fontWeight: 800, color: T.white, lineHeight: 1, fontFamily: T.font }}>{value}</div>
        <div style={{ fontSize: 11, color: T.white, marginTop: 4, fontFamily: T.font }}>
          {value === 1 ? "koleso" : value < 5 ? "kolesá" : "kolies"}
        </div>
      </div>
      <button
        className="press-scale hover-glow"
        onClick={() => { haptic.medium(); onChange(value + 1); }}
        style={{
          width: 48, height: 48, borderRadius: 24, border: `2px solid ${T.accent}`,
          background: "transparent", fontSize: 22, fontWeight: 700, cursor: "pointer",
          color: T.accent, display: "flex", alignItems: "center", justifyContent: "center",
          fontFamily: T.font, transition: "all 0.15s",
        }}
      >+</button>
    </div>
  );
}

function ServiceToggle({ service, active, price, qty, onToggle }) {
  const total = price * qty;
  return (
    <button
      className="press-scale"
      onClick={() => { haptic.light(); onToggle(); }}
      style={{
        display: "flex", alignItems: "center", gap: 12,
        width: "100%", padding: "12px 14px", borderRadius: 12,
        border: active ? `2px solid ${T.accent}` : `2px solid ${T.grayMuted}`,
        background: active ? T.accentDim : T.card,
        cursor: "pointer", transition: "all 0.15s", textAlign: "left",
        fontFamily: T.font,
      }}
    >
      <div style={{
        width: 26, height: 26, borderRadius: 8,
        background: active ? T.accent : T.grayMuted,
        display: "flex", alignItems: "center", justifyContent: "center",
        flexShrink: 0, transition: "all 0.15s",
      }}>
        {active && <span className="check-pop" style={{ color: T.white, fontSize: 13, fontWeight: 700 }}>✓</span>}
      </div>
      <div style={{ flex: 1 }}>
        <div style={{ fontSize: 14, fontWeight: 400, color: T.white }}>{service.name}</div>
        <div style={{ fontSize: 12, color: T.grayLight }}>{formatEur(price)} / ks</div>
      </div>
      {active && (
        <div style={{ fontSize: 14, fontWeight: 700, color: T.accent }}>
          {formatEur(total)}
        </div>
      )}
    </button>
  );
}

function PresetButtons({ onSelect, activePreset }) {
  return (
    <div style={{ display: "flex", gap: 8, flexWrap: "nowrap" }}>
      {PRESETS.map((p) => (
        <button
          key={p.id}
          className="press-scale"
          onClick={() => { haptic.medium(); onSelect(p); }}
          style={{
            flex: 1, minWidth: 0,
            padding: "8px 10px", borderRadius: 20,
            border: activePreset === p.id ? `2px solid ${T.accent}` : `2px solid ${T.grayMuted}`,
            background: activePreset === p.id ? T.accentDim : "transparent",
            fontSize: 13, fontWeight: 600, cursor: "pointer",
            color: activePreset === p.id ? T.accent : T.grayLight,
            fontFamily: T.font, transition: "all 0.15s",
            whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
          }}
        >
          {p.name}
        </button>
      ))}
    </div>
  );
}

function WheelGroup({ group, onUpdate, onRemove, isOnly }) {
  const sizeIdx = group.sizeIndex;
  const activePreset = PRESETS.find(
    (p) => p.services.length === group.services.length && p.services.every((s) => group.services.includes(s))
  )?.id || null;

  const groupTotal = useMemo(() => {
    return group.services.reduce((sum, sId) => sum + getPrice(sId, sizeIdx) * group.qty, 0);
  }, [group.services, sizeIdx, group.qty]);

  const handlePreset = (preset) => {
    if (activePreset === preset.id) {
      onUpdate({ ...group, services: [] });
    } else {
      onUpdate({ ...group, services: [...preset.services] });
    }
  };

  const toggleService = (serviceId) => {
    const next = group.services.includes(serviceId)
      ? group.services.filter((s) => s !== serviceId)
      : [...group.services, serviceId];
    onUpdate({ ...group, services: next });
  };

  return (
    <div className="card-enter" style={{
      background: T.card, borderRadius: 20, padding: 20,
      border: `1px solid ${T.cardBorder}`,
      boxShadow: "0 2px 16px rgba(0,0,0,0.3)",
      marginBottom: 16,
    }}>
      {/* Header */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18 }}>
        <div style={{ fontSize: 16, fontWeight: 700, color: T.white, fontFamily: T.font }}>
          {!isOnly ? `Skupina ${group.label}` : ""}
        </div>
        {!isOnly && (
          <button className="press-scale-sm" onClick={() => { haptic.heavy(); onRemove(); }} style={{
            background: "none", border: "none", color: T.danger, fontSize: 13,
            fontWeight: 600, cursor: "pointer", padding: "4px 8px", fontFamily: T.font,
          }}>
            Odstrániť
          </button>
        )}
      </div>

      {/* Size */}
      <div style={{ marginBottom: 20 }}>
        <div style={{ fontSize: 15, fontWeight: 600, color: T.white, marginBottom: 10, fontFamily: T.font }}>Veľkosť kolies</div>
        <SizeSelector selected={sizeIdx} onChange={(i) => onUpdate({ ...group, sizeIndex: i })} />
      </div>

      {/* Quantity */}
      <div style={{ marginBottom: 20 }}>
        <div style={{ fontSize: 15, fontWeight: 600, color: T.white, marginBottom: 10, fontFamily: T.font }}>Počet kusov</div>
        <QuantitySelector value={group.qty} onChange={(v) => onUpdate({ ...group, qty: v })} />
      </div>

      {/* Presets */}
      <div style={{ marginBottom: 16 }}>
        <div style={{ fontSize: 15, fontWeight: 600, color: T.white, marginBottom: 10, fontFamily: T.font }}>Rýchly výber</div>
        <PresetButtons onSelect={handlePreset} activePreset={activePreset} />
      </div>

      {/* Services */}
      <div>
        <div style={{ fontSize: 15, fontWeight: 600, color: T.white, marginBottom: 10, fontFamily: T.font }}>Služby</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          {SERVICES.map((srv) => (
            <ServiceToggle
              key={srv.id}
              service={srv}
              active={group.services.includes(srv.id)}
              price={getPrice(srv.id, sizeIdx)}
              qty={group.qty}
              onToggle={() => toggleService(srv.id)}
            />
          ))}
        </div>
      </div>

      {/* Group total */}
      {groupTotal > 0 && (
        <div className="subtotal-reveal" style={{
          marginTop: 16, padding: "14px 16px", borderRadius: 14,
          background: T.grayMuted, display: "flex", justifyContent: "space-between",
          alignItems: "center", border: `1px solid ${T.cardBorder}`,
        }}>
          <span style={{ fontSize: 14, color: T.white, fontWeight: 600, fontFamily: T.font }}>Medzisúčet</span>
          <span style={{ fontSize: 20, fontWeight: 800, color: T.white, fontFamily: T.font }}>{formatEur(groupTotal)}</span>
        </div>
      )}
    </div>
  );
}


// --- WHATSAPP HELPER ---
function buildWhatsAppMessage(groups, totalPrice) {
  const lines = ["*Objednávka pneuservisu*", "*Káčer Autodetailing*", ""];
  groups.forEach((g, idx) => {
    if (g.services.length === 0) return;
    const sizeLabel = ['15"', '16"', '17"', '18"', '19"', '20"', '21"'][g.sizeIndex];
    lines.push(`▸ ${sizeLabel} × ${g.qty} ks`);
    g.services.forEach((sId) => {
      const srv = SERVICES.find((s) => s.id === sId);
      const price = getPrice(sId, g.sizeIndex);
      const total = price * g.qty;
      lines.push(`  ${srv.name}: ${formatEur(total)}`);
    });
    lines.push("");
  });
  lines.push(`*Celkom: ${formatEur(totalPrice)}*`);
  return lines.join("\n");
}

function sendWhatsApp(groups, totalPrice) {
  const phone = "421903846689";
  const msg = buildWhatsAppMessage(groups, totalPrice);
  const url = `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
  window.open(url, "_blank");
}

// --- MAIN APP ---
function PneuservisApp() {
  const [groups, setGroups] = useState([
    { id: 1, label: "A", sizeIndex: 2, qty: 4, services: [] },
  ]);

  

  const updateGroup = (id, updated) => {
    setGroups((gs) => gs.map((g) => (g.id === id ? updated : g)));
  };

  const removeGroup = (id) => {
    setGroups((gs) => gs.filter((g) => g.id !== id));
  };

  const addGroup = () => {
    const label = String.fromCharCode(65 + groups.length);
    setGroups((gs) => [...gs, { id: nextGroupId++, label, sizeIndex: 2, qty: 4, services: [] }]);
  };

  const totalPrice = useMemo(() => {
    return groups.reduce((total, g) => {
      return total + g.services.reduce((sum, sId) => sum + getPrice(sId, g.sizeIndex) * g.qty, 0);
    }, 0);
  }, [groups]);

  const totalItems = groups.reduce((sum, g) => {
    return sum + (g.services.length > 0 ? g.qty : 0);
  }, 0);

  const reset = () => {
    nextGroupId = 2;
    setGroups([{ id: 1, label: "A", sizeIndex: 2, qty: 4, services: [] }]);
  };

  return (
    <div style={{
      maxWidth: 420, margin: "0 auto", minHeight: "100vh",
      background: T.black, fontFamily: T.font,
    }}>
      <GlobalStyles />
      {/* Google Font import */}
      <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

      {/* Header */}
      <div style={{
        background: `linear-gradient(180deg, ${T.card} 0%, ${T.black} 100%)`,
        padding: "28px 20px 24px",
        borderBottom: `1px solid ${T.cardBorder}`,
      }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <Logo />
          <button className="press-scale" onClick={() => { haptic.heavy(); reset(); }} style={{
            background: "transparent", border: `1px solid ${T.accent}`,
            color: T.accent, padding: "8px 14px", borderRadius: 12,
            fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: T.font,
            transition: "all 0.15s",
          }}>
            Nový výpočet
          </button>
        </div>
        {/* Subtitle */}
        <div style={{
          marginTop: 16, fontSize: 18, fontWeight: 700, color: T.white,
          fontFamily: T.font, letterSpacing: -0.3,
        }}>
          Objednávka{" "}
          <span style={{ color: T.accent }}>pneuservisu</span>
        </div>
      </div>

      {/* Content */}
      <div className="elastic-content" style={{ padding: "16px 16px 160px" }}>
        {groups.map((g) => (
          <WheelGroup
            key={g.id}
            group={g}
            onUpdate={(updated) => updateGroup(g.id, updated)}
            onRemove={() => removeGroup(g.id)}
            isOnly={groups.length === 1}
          />
        ))}

        {/* Add group */}
        <button
          className="press-scale hover-glow"
          onClick={() => { haptic.medium(); addGroup(); }}
          style={{
            width: "100%", padding: "16px", borderRadius: 16,
            border: `2px dashed ${T.accent}`, background: "transparent",
            color: T.white, fontSize: 14, fontWeight: 600,
            cursor: "pointer", display: "flex", alignItems: "center",
            justifyContent: "center", gap: 8, fontFamily: T.font,
            transition: "all 0.15s",
          }}
        >
          <span style={{ fontSize: 20, lineHeight: 1, color: T.accent }}>+</span>
          Pridať ďalšiu veľkosť kolies
        </button>
      </div>

      {/* Bottom bar */}
      <div style={{
        position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)",
        width: "100%", maxWidth: 420,
        background: T.card, padding: "16px 20px 20px",
        borderTop: `1px solid ${T.cardBorder}`,
        boxShadow: "0 -8px 24px rgba(0,0,0,0.5)",
        borderRadius: "20px 20px 0 0",
      }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
          <div>
            <div style={{ fontSize: 11, color: T.white, fontWeight: 500, fontFamily: T.font }}>
              {groups.length > 1 ? `${groups.length} skupiny` : ""}{totalItems > 0 ? ` • ${totalItems} ks` : ""}
            </div>
            <div style={{ fontSize: 13, color: T.white, fontFamily: T.font, fontWeight: 500 }}>Celková suma</div>
          </div>
          <div style={{ fontSize: 30, fontWeight: 800, color: T.white, fontFamily: T.font }}>
            {formatEur(totalPrice)}
          </div>
        </div>
        <button
          className={totalPrice > 0 ? "press-scale hover-glow" : ""}
          onClick={() => { if (totalPrice > 0) { haptic.success(); sendWhatsApp(groups, totalPrice); } }}
          style={{
          width: "100%", padding: "15px", borderRadius: 14,
          background: totalPrice > 0 ? T.accent : T.grayMuted,
          color: totalPrice > 0 ? T.white : T.gray,
          border: "none", fontSize: 16, fontWeight: 700,
          cursor: totalPrice > 0 ? "pointer" : "default",
          fontFamily: T.font, letterSpacing: 0.3,
          boxShadow: totalPrice > 0 ? `0 4px 16px ${T.accentGlow}` : "none",
          transition: "all 0.2s",
          display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
        }}>
          Potvrdiť objednávku
        </button>
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<PneuservisApp />);
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    }
  </script>
</body>
